<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Semanal Meta Ads</title>
    
    <!-- Tailwind CSS para Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#056250',   // Verde elegante solicitado
                        primaryLight: '#089177', // Verde más claro para contrastes oscuros
                        accent: '#bb9b54',    // Dorado/Bronce premium para contrastar
                        success: '#10b981',   // Verde estándar para métricas buenas
                        danger: '#ef4444'     // Rojo estándar para alertas
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts y sus dependencias estables -->
    <script src="https://unpkg.com/react-is/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
</head>
<body class="bg-slate-900 print:bg-white text-slate-200 antialiased selection:bg-primaryLight selection:text-white">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, BarChart, Bar, Legend } = window.Recharts;

        // --- ICONOS SVG ---
        const IconWrapper = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const DollarSign = (p) => <IconWrapper {...p}><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconWrapper>;
        const Users = (p) => <IconWrapper {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const Target = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconWrapper>;
        const MousePointerClick = (p) => <IconWrapper {...p}><path d="m9 9 5 12 1.8-5.2L21 14Z"/><path d="M7.2 2.2 8 5.1"/><path d="m5.1 8-2.9-.8"/><path d="M14 4.1 12 6"/><path d="m6 12-1.9 2"/></IconWrapper>;
        const Activity = (p) => <IconWrapper {...p}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></IconWrapper>;
        const Calendar = (p) => <IconWrapper {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
        const Download = (p) => <IconWrapper {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconWrapper>;
        const UploadCloud = (p) => <IconWrapper {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></IconWrapper>;
        const AlertCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
        const BarChart2 = (p) => <IconWrapper {...p}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></IconWrapper>;
        const Eye = (p) => <IconWrapper {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
        const Zap = (p) => <IconWrapper {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconWrapper>;

        // --- FUNCIONES DE FORMATO GLOBALES ---
        const formatCurrency = (value) => new Intl.NumberFormat('es-US', { style: 'currency', currency: 'USD' }).format(value || 0);
        const formatNumber = (value) => new Intl.NumberFormat('es-US').format(value || 0);

        // --- DATOS INICIALES ---
        const initialData = [
          { id: 1, segmentName: 'AD+', date: '2026-03-29', spend: 49.18, reach: 1360, impressions: 2273, clicks: 31, results: 3, cpl: 16.39 },
          { id: 2, segmentName: 'Retargeting_Web', date: '2026-03-29', spend: 25.00, reach: 850, impressions: 1200, clicks: 45, results: 5, cpl: 5.00 },
          { id: 3, segmentName: 'Lookalike_1%', date: '2026-03-29', spend: 30.00, reach: 1100, impressions: 1500, clicks: 20, results: 1, cpl: 30.00 },
          { id: 4, segmentName: 'AD+', date: '2026-03-30', spend: 52.00, reach: 1420, impressions: 2400, clicks: 35, results: 4, cpl: 13.00 },
          { id: 5, segmentName: 'Retargeting_Web', date: '2026-03-30', spend: 28.50, reach: 910, impressions: 1350, clicks: 52, results: 7, cpl: 4.07 },
          { id: 6, segmentName: 'Lookalike_1%', date: '2026-03-30', spend: 35.00, reach: 1250, impressions: 1750, clicks: 25, results: 2, cpl: 17.50 },
        ];

        // Tonos de React Recharts adaptados al nuevo tema oscuro
        const COLORS = {
          primary: '#089177', // Verde adaptado para mejor visibilidad en oscuro
          accent: '#bb9b54',
          success: '#10b981',
          danger: '#ef4444',
          grid: '#334155',    // slate-700
          text: '#94a3b8',    // slate-400
          tooltipBg: '#1e293b'// slate-800
        };

        function App() {
          const [data, setData] = useState(initialData);
          const [dateRange, setDateRange] = useState({ start: '2026-03-29', end: '2026-03-30' });
          const [reportType, setReportType] = useState('Conjunto de Anuncios'); 
          const [error, setError] = useState('');
          const [showToast, setShowToast] = useState(false);
          const fileInputRef = useRef(null);

          // --- PROCESAMIENTO DE CSV ---
          const handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
              const text = e.target.result;
              parseCSV(text);
            };
            reader.onerror = () => setError('Error al leer el archivo.');
            reader.readAsText(file);
          };

          const parseCSV = (csvText) => {
            try {
              const lines = csvText.split(/\r?\n/).filter(line => line.trim());
              if (lines.length < 2) throw new Error("El archivo está vacío o no tiene el formato correcto.");
              
              const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/"/g, '').trim().toLowerCase());
              
              let detectedType = 'Segmento';
              let idxName = headers.findIndex(h => h.includes("nombre de la campaña") || h.includes("campaign name"));
              if (idxName !== -1) {
                detectedType = 'Campaña';
              } else {
                idxName = headers.findIndex(h => h.includes("conjunto de anuncios") || h.includes("ad set name"));
                if (idxName !== -1) detectedType = 'Conjunto de Anuncios';
              }

              const idxSpend = headers.findIndex(h => h.includes("importe gastado") || h.includes("amount spent"));
              const idxResults = headers.findIndex(h => h === "resultados" || h === "results");
              const idxCPL = headers.findIndex(h => h.includes("coste por resultados") || h.includes("cost per result"));
              const idxReach = headers.findIndex(h => h === "alcance" || h === "reach");
              const idxImpressions = headers.findIndex(h => h.includes("impresiones") || h.includes("impressions"));
              const idxClicks = headers.findIndex(h => h.includes("clics (todos)") || h.includes("clics en el enlace") || h.includes("link clicks"));
              
              const idxDateStart = headers.findIndex(h => h.includes("inicio del informe") || h === "inicio");
              const idxDateEnd = headers.findIndex(h => h.includes("fin del informe") || h === "fin");

              if (idxSpend === -1) throw new Error("No se encontró la columna de Importe Gastado.");

              const parsedData = [];
              let idCounter = 1;
              let minDate = '9999-12-31';
              let maxDate = '0000-00-00';

              for (let i = 1; i < lines.length; i++) {
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if (row.length < 5) continue; 

                const segmentName = idxName !== -1 ? row[idxName] : 'General';
                if (!segmentName || segmentName === '' || row[idxSpend] === '') continue; 

                const spend = parseFloat(row[idxSpend]) || 0;
                const results = idxResults !== -1 ? parseFloat(row[idxResults]) || 0 : 0;
                let cpl = idxCPL !== -1 ? parseFloat(row[idxCPL]) || 0 : 0;
                
                if (cpl === 0 && results > 0) cpl = spend / results;

                const rowStartDate = idxDateStart !== -1 ? row[idxDateStart] : 'N/A';
                const rowEndDate = idxDateEnd !== -1 ? row[idxDateEnd] : 'N/A';
                
                if (rowStartDate !== 'N/A' && rowStartDate < minDate) minDate = rowStartDate;
                if (rowEndDate !== 'N/A' && rowEndDate > maxDate) maxDate = rowEndDate;
                if (rowStartDate !== 'N/A' && rowEndDate === 'N/A' && rowStartDate > maxDate) maxDate = rowStartDate;

                const reach = idxReach !== -1 ? parseInt(row[idxReach]) || 0 : 0;
                const impressions = idxImpressions !== -1 ? parseInt(row[idxImpressions]) || 0 : 0;

                parsedData.push({
                  id: idCounter++,
                  segmentName: segmentName,
                  date: rowStartDate,
                  spend: spend,
                  results: results,
                  cpl: cpl,
                  reach: reach,
                  impressions: impressions,
                  clicks: idxClicks !== -1 ? parseInt(row[idxClicks]) || 0 : 0,
                });
              }

              if (parsedData.length === 0) throw new Error("No se encontraron datos válidos de campañas.");
              
              setData(parsedData);
              setReportType(detectedType);
              setDateRange({ 
                start: minDate !== '9999-12-31' ? minDate : 'N/A', 
                end: maxDate !== '0000-00-00' ? maxDate : 'N/A' 
              });
              setError('');
            } catch (err) {
              setError(err.message);
            }
          };

          // --- AGRUPACIONES Y CALCULOS ---
          const kpis = useMemo(() => {
            if (!data.length) return { spend: 0, results: 0, cpl: 0, clicks: 0, reach: 0, impressions: 0 };
            const totalSpend = data.reduce((sum, item) => sum + item.spend, 0);
            const totalResults = data.reduce((sum, item) => sum + item.results, 0);
            const totalClicks = data.reduce((sum, item) => sum + item.clicks, 0);
            const totalReach = data.reduce((sum, item) => sum + item.reach, 0);
            const totalImpressions = data.reduce((sum, item) => sum + item.impressions, 0);
            return {
              spend: totalSpend,
              results: totalResults,
              cpl: totalResults > 0 ? totalSpend / totalResults : 0,
              clicks: totalClicks,
              reach: totalReach,
              impressions: totalImpressions,
              ctr: totalImpressions > 0 ? ((totalClicks / totalImpressions) * 100).toFixed(2) : 0
            };
          }, [data]);

          const performanceData = useMemo(() => {
            const grouped = data.reduce((acc, curr) => {
              if (!acc[curr.segmentName]) {
                acc[curr.segmentName] = { segmentName: curr.segmentName, spend: 0, results: 0, reach: 0, impressions: 0, clicks: 0 };
              }
              acc[curr.segmentName].spend += curr.spend;
              acc[curr.segmentName].results += curr.results;
              acc[curr.segmentName].reach += curr.reach;
              acc[curr.segmentName].impressions += curr.impressions;
              acc[curr.segmentName].clicks += curr.clicks;
              return acc;
            }, {});
            
            return Object.values(grouped).map(item => ({
              ...item,
              cpl: item.results > 0 ? Number((item.spend / item.results).toFixed(2)) : 0,
              ctr: item.impressions > 0 ? Number(((item.clicks / item.impressions) * 100).toFixed(2)) : 0
            })).sort((a, b) => a.cpl - b.cpl); 
          }, [data]);

          const trendData = useMemo(() => {
            const grouped = data.reduce((acc, curr) => {
              const key = curr.date !== 'N/A' && curr.date !== dateRange.start ? curr.date : curr.segmentName;
              if (!acc[key]) acc[key] = { name: key, spend: 0, results: 0 };
              acc[key].spend += curr.spend;
              acc[key].results += curr.results;
              return acc;
            }, {});
            return Object.values(grouped).sort((a, b) => a.name.localeCompare(b.name));
          }, [data, dateRange]);

          const strategicInsights = useMemo(() => {
            if (!performanceData.length) return "Carga tu reporte semanal para generar insights.";
            
            const activeSegments = performanceData.filter(a => a.results > 0);
            const topSegment = activeSegments.length > 0 ? activeSegments[0] : performanceData[0];
            
            return (
              <span>
                Resumen Semanal: La inversión de <strong className="text-accent">{formatCurrency(kpis.spend)}</strong> generó <strong>{kpis.results} resultados</strong> a un costo promedio de <strong>{formatCurrency(kpis.cpl)}</strong>. 
                El pilar de eficiencia esta semana fue <em className="font-semibold text-white">{topSegment?.segmentName || "N/A"}</em> ({formatCurrency(topSegment?.cpl || 0)} CPL). 
                Mantener este nivel de CPL será la prioridad para la próxima semana, monitoreando la saturación de la audiencia.
              </span>
            );
          }, [performanceData, kpis]);

          const handlePrint = () => {
            try {
              window.print();
            } catch (e) {
              console.log("Impresión bloqueada por el entorno.");
            }
            setShowToast(true);
            setTimeout(() => setShowToast(false), 7000);
          };

          // --- COMPONENTES UI INTERNOS ---
          const KPICard = ({ title, value, subtitle, icon: Icon, isPrimary }) => (
            <div className={`bg-slate-800 rounded-2xl p-6 shadow-lg border ${isPrimary ? 'border-primary/50 shadow-primary/20' : 'border-slate-700 hover:border-slate-600'} flex items-center justify-between transition-all duration-300 group`}>
              <div>
                <p className="text-sm font-medium text-slate-400 mb-1">{title}</p>
                <h3 className={`text-3xl font-extrabold ${isPrimary ? 'text-primaryLight' : 'text-white'}`}>{value}</h3>
                {subtitle && <p className="text-xs text-slate-500 mt-2">{subtitle}</p>}
              </div>
              <div className={`p-4 rounded-xl transition-transform duration-300 ${isPrimary ? 'bg-primary/20 text-primaryLight' : 'bg-slate-700/50 text-slate-400 group-hover:text-primaryLight group-hover:bg-primary/10 group-hover:scale-110'}`}>
                <Icon size={28} />
              </div>
            </div>
          );

          return (
            <div className="min-h-screen pb-16 print:pb-0">
              
              {/* HEADER */}
              <header className="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 px-6 py-5 sticky top-0 z-50 shadow-sm print:hidden">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-4">
                    <div className="bg-primary/20 p-3 rounded-xl border border-primary/30">
                      <Activity className="text-primaryLight" size={28} />
                    </div>
                    <div>
                      <h1 className="text-2xl font-black tracking-tight text-white">
                        Reporte de Crecimiento
                      </h1>
                      <div className="flex items-center gap-2 mt-1">
                        <span className="text-xs font-bold text-white bg-primary px-2 py-0.5 rounded uppercase tracking-wider">
                          {reportType}
                        </span>
                        <span className="text-sm font-medium text-slate-400 flex items-center gap-1">
                          <Calendar size={14} className="text-primaryLight/70" /> 
                          {dateRange.start !== 'N/A' ? `${dateRange.start} al ${dateRange.end}` : 'Semana Actual'}
                        </span>
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-4 print:hidden">
                    <button 
                      onClick={handlePrint}
                      className="flex items-center gap-2 bg-slate-800 border border-slate-700 hover:border-primary/50 text-slate-300 hover:text-primaryLight px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 active:scale-95 shadow-sm"
                    >
                      <Download size={18} />
                      Descargar PDF
                    </button>
                    <input 
                      type="file" 
                      accept=".csv" 
                      className="hidden" 
                      ref={fileInputRef} 
                      onChange={handleFileUpload} 
                    />
                    <button 
                      onClick={() => fileInputRef.current.click()}
                      className="flex items-center gap-2 bg-primary hover:bg-[#044a3c] text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md active:scale-95"
                    >
                      <UploadCloud size={18} />
                      Cargar Reporte (CSV)
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 space-y-8 print:m-0 print:p-0 print:max-w-none print:w-full">
                
                {error && (
                  <div className="bg-danger/10 border border-danger/20 text-danger p-4 rounded-xl flex items-center gap-3">
                    <AlertCircle size={20} />
                    <p className="font-semibold">{error}</p>
                  </div>
                )}

                {/* NARRATIVA */}
                <section className="bg-gradient-to-br from-primary to-[#033d31] rounded-2xl p-8 text-white shadow-lg relative overflow-hidden group border border-slate-700/50">
                  <div className="absolute top-0 right-0 opacity-10 pointer-events-none transform translate-x-10 -translate-y-10 transition-transform duration-700 group-hover:scale-110">
                    <Target size={250} />
                  </div>
                  <div className="relative z-10">
                    <h2 className="text-xl font-bold flex items-center gap-2 mb-3 text-white">
                      <Target size={24} className="text-accent" />
                      Visión Ejecutiva de la Semana
                    </h2>
                    <p className="text-lg text-slate-100 max-w-4xl leading-relaxed">
                      {strategicInsights}
                    </p>
                  </div>
                </section>

                {/* KPIS */}
                <section className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
                  <div className="xl:col-span-2">
                    <KPICard title="Presupuesto Ejecutado" value={formatCurrency(kpis.spend)} icon={DollarSign} isPrimary={true} />
                  </div>
                  <KPICard title="Conversiones" value={formatNumber(kpis.results)} icon={Users} />
                  <KPICard title="CPL" value={formatCurrency(kpis.cpl)} icon={Target} />
                  <KPICard title="Alcance" value={formatNumber(kpis.reach)} icon={Zap} />
                  <KPICard title="Impresiones" value={formatNumber(kpis.impressions)} icon={Eye} />
                </section>

                {/* VISUALIZACIONES */}
                <section className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  
                  {/* CHART: Volumen vs Inversión */}
                  <div className="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700 flex flex-col">
                    <div className="mb-6 flex justify-between items-center">
                      <div>
                        <h3 className="text-lg font-bold text-white flex items-center gap-2">
                          Volumen vs Inversión
                        </h3>
                        <p className="text-sm text-slate-400">Comportamiento temporal</p>
                      </div>
                      <BarChart2 className="text-slate-500" size={24} />
                    </div>
                    <div className="h-80 flex-grow">
                      <ResponsiveContainer width="100%" height="100%">
                        {trendData.length > 1 ? (
                          <AreaChart data={trendData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                            <defs>
                              <linearGradient id="colorSpend2" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="5%" stopColor={COLORS.primary} stopOpacity={0.4}/>
                                <stop offset="95%" stopColor={COLORS.primary} stopOpacity={0}/>
                              </linearGradient>
                            </defs>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={COLORS.grid} />
                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: COLORS.text }} dy={10} />
                            <YAxis yAxisId="left" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: COLORS.text }} tickFormatter={(val) => `$${val}`} />
                            <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: COLORS.text }} />
                            <RechartsTooltip 
                              contentStyle={{ backgroundColor: COLORS.tooltipBg, borderRadius: '12px', border: `1px solid ${COLORS.grid}`, color: '#f8fafc', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.3)' }}
                              itemStyle={{ color: '#f8fafc' }}
                              labelStyle={{ fontWeight: 'bold', color: COLORS.primary, marginBottom: '4px' }}
                            />
                            <Legend iconType="circle" wrapperStyle={{ paddingTop: '20px' }}/>
                            <Area yAxisId="left" type="monotone" dataKey="spend" name="Inversión ($)" stroke={COLORS.primary} strokeWidth={3} fillOpacity={1} fill="url(#colorSpend2)" />
                            <Area yAxisId="right" type="monotone" dataKey="results" name="Resultados" stroke={COLORS.accent} strokeWidth={3} fillOpacity={0} />
                          </AreaChart>
                        ) : (
                          <BarChart data={trendData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={COLORS.grid} />
                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: COLORS.text }} dy={10} />
                            <YAxis yAxisId="left" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: COLORS.text }} tickFormatter={(val) => `$${val}`} />
                            <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: COLORS.text }} />
                            <RechartsTooltip contentStyle={{ backgroundColor: COLORS.tooltipBg, borderRadius: '12px', border: `1px solid ${COLORS.grid}` }} />
                            <Legend iconType="circle" wrapperStyle={{ paddingTop: '20px' }}/>
                            <Bar yAxisId="left" dataKey="spend" name="Inversión ($)" fill={COLORS.primary} radius={[4, 4, 0, 0]} />
                            <Bar yAxisId="right" dataKey="results" name="Resultados" fill={COLORS.accent} radius={[4, 4, 0, 0]} />
                          </BarChart>
                        )}
                      </ResponsiveContainer>
                    </div>
                  </div>

                  {/* RANKING: Eficiencia */}
                  <div className="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700 flex flex-col">
                    <div className="mb-6">
                      <h3 className="text-lg font-bold text-white">Desempeño por {reportType}</h3>
                      <p className="text-sm text-slate-400">Ordenado por rentabilidad (CPL)</p>
                    </div>
                    
                    <div className="flex-grow overflow-auto pr-2 custom-scrollbar">
                      <style>
                        {`
                          .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                          .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
                          .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
                          .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
                        `}
                      </style>
                      <div className="space-y-4">
                        {performanceData.map((item, index) => {
                          const isTop = index === 0 && item.results > 0;
                          const cplHealth = item.cpl > kpis.cpl * 1.2 ? 'text-danger' : (item.cpl <= kpis.cpl ? 'text-success' : 'text-amber-400');
                          
                          return (
                            <div key={index} className={`p-4 rounded-xl border ${isTop ? 'border-primary/50 bg-primary/10' : 'border-slate-700 bg-slate-700/30'} flex justify-between items-center transition-all hover:border-slate-600`}>
                              <div className="w-1/2 pr-4">
                                <div className="flex items-center gap-2">
                                  <h4 className="font-semibold text-slate-200 truncate" title={item.segmentName}>
                                    {item.segmentName}
                                  </h4>
                                  {isTop && <span className="bg-accent text-slate-900 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest shadow-sm">Top</span>}
                                </div>
                                <p className="text-xs text-slate-400 mt-1">
                                  Inv: <span className="font-medium text-slate-300">{formatCurrency(item.spend)}</span> &bull; 
                                  Alcance: <span className="font-medium text-slate-300">{formatNumber(item.reach)}</span>
                                </p>
                              </div>
                              
                              <div className="w-1/4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Resultados</p>
                                <p className="font-black text-white text-lg">{formatNumber(item.results)}</p>
                              </div>
                              
                              <div className="w-1/4 text-right">
                                <p className="text-xs text-slate-400 mb-1">CPL</p>
                                <p className={`font-black text-lg ${cplHealth}`}>
                                  {item.results > 0 ? formatCurrency(item.cpl) : 'N/A'}
                                </p>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </section>
                
                {/* TOAST DE IMPRESION */}
                {showToast && (
                  <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 border border-slate-700 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 z-50 print:hidden transition-all duration-300">
                    <div className="bg-primary/20 border border-primary/30 p-2 rounded-full flex-shrink-0">
                      <Download size={16} className="text-primaryLight" />
                    </div>
                    <div className="flex flex-col">
                      <span className="font-bold text-sm text-white">Preparando tu reporte...</span>
                      <span className="text-xs text-slate-400">
                        Si el PDF no se genera, presiona <kbd className="bg-slate-900 border border-slate-600 px-1.5 py-0.5 rounded mx-1 text-slate-300">Ctrl + P</kbd>
                      </span>
                    </div>
                    <button onClick={() => setShowToast(false)} className="ml-4 text-slate-500 hover:text-white transition-colors text-lg">
                      &times;
                    </button>
                  </div>
                )}

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
